name: Frontend CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

env:
  ECR_REPOSITORY: ctse-ticket/frontend
  ECS_CLUSTER: ctse-ticket-cluster
  ECS_SERVICE: frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  sonarcloud:
    name: SonarCloud Scan
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure SonarCloud project exists
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Create project if it doesn't exist (API returns 400 if already exists, that's OK)
          curl -s -u "${SONAR_TOKEN}:" \
            -X POST "https://sonarcloud.io/api/projects/create" \
            -d "project=ctse-ticket_frontend&name=frontend&organization=ctse-ticket" || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ./frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  security:
    name: Snyk Security Scan
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Snyk Dependency Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=./frontend/package.json

  build-and-push:
    name: Build & Push to ECR
    needs: [lint, sonarcloud, security]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' && needs.lint.result == 'success' && (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'failure') && (needs.security.result == 'success' || needs.security.result == 'failure')
    outputs:
      image-tag: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get API Gateway URL
        id: api-gw
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='ctse-ticket-api'].id" --output text)
          API_GW_URL="https://${API_ID}.execute-api.${{ secrets.AWS_REGION }}.amazonaws.com/prod"
          echo "url=$API_GW_URL" >> $GITHUB_OUTPUT
          echo "API Gateway URL: $API_GW_URL"

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          API_GW_URL: ${{ steps.api-gw.outputs.url }}
        run: |
          docker build \
            --build-arg USER_SERVICE_URL=$API_GW_URL \
            --build-arg EVENT_SERVICE_URL=$API_GW_URL \
            --build-arg PAYMENT_SERVICE_URL=$API_GW_URL \
            --build-arg BOOKING_SERVICE_URL=$API_GW_URL \
            --build-arg REVIEW_SERVICE_URL=$API_GW_URL \
            --build-arg NOTIFICATION_SERVICE_URL=$API_GW_URL \
            --build-arg REPORTING_SERVICE_URL=$API_GW_URL \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest \
            ./frontend
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always() && needs.build-and-push.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/task-definitions/frontend.json
          container-name: frontend
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/ctse-ticket/frontend:${{ github.sha }}

      - name: Set health check grace period
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --health-check-grace-period-seconds 120 \
            --query 'service.healthCheckGracePeriodSeconds' --output text

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10
